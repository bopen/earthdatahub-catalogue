properties:
  edh:maturity: draft
  dc:abstract: High resolution, single levels or surface variables, derived from the
    ICON model Control run. Covers the time period 1990-1999. Optimised for time-series access.
  title: Climate DT high resolution hourly data on single-level or surface, ICON,
    Control, timeseries
  dc:access_rights: restricted
  description: Climate DT high resolution hourly data on single-level or surface, timeseries
    ICON, Control
  datetime: '1999-12-31T23:00:00Z'
  start_datetime: '1990-01-01T00:00:00Z'
  end_datetime: '1999-12-31T23:00:00Z'
  cube:dimensions:
    time:
      type: temporal
      axis: t
      extent:
      - '1990-01-01T00:00:00Z'
      - '1999-12-31T23:00:00Z'
      step: PT1H
    latitude:
      type: spatial
      axis: y
      reference_system: 4326
      step: 0.04
      extent:
      - -90.0
      - 90.0
    longitude:
      type: spatial
      axis: x
      reference_system: 4326
      step: 0.04
      extent:
      - -180.0
      - 180.0
  cube:variables:
    t2m:
      dimensions:
      - time
      - latitude
      - longitude
      type: data
      description: 2 metre temperature
      unit: K
    u10:
      dimensions:
      - time
      - latitude
      - longitude
      type: data
      description: 10 metre U wind component
      unit: m s**-1
    v10:
      dimensions:
      - time
      - latitude
      - longitude
      type: data
      description: 10 metre V wind component
      unit: m s**-1
    avg_tprate:
      dimensions:
      - time
      - latitude
      - longitude
      type: data
      description: Time-mean total precipitation rate
      unit: kg m**-2 s**-1
    d2m:
      dimensions:
      - time
      - latitude
      - longitude
      type: data
      description: 2 metre dewpoint temperature
      unit: K
