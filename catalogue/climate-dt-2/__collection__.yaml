title: Climate DT
dc:abstract:
  The Second Generation Destination Earth Digital Twin for Climate Change Adaptation supports
  climate adaptation activities through the provision of innovative climate information on multi-decadal
  timescales, at km-scale resolutions of 5 to 10km.
