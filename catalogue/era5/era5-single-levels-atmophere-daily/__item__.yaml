properties:
  edh:maturity: draft
  dc:abstract: ERA5 reanalysis on the surface (single-levels) for atmospheric and
    land surface quantities. The dataset is provided in a ARCO Zarr v3 format ideal
    for time series analysis
  dc:title: ERA5-Land daily averaged data
  datetime: '2026-02-28T00:00:00Z'
  start_datetime: '1940-01-01T00:00:00Z'
  end_datetime: '2026-02-28T00:00:00Z'
  dc:access_rights: unrestricted
  dc:subject:
  - ERA5
  - Land
  - ECMWF
  - reanalysis
  - weather
  dc:accrual_periodicity: freq:monthly
  cube:dimensions:
    valid_time:
      type: temporal
      axis: t
      extent:
      - '1940-01-01T00:00:00Z'
      - '2026-02-28T00:00:00Z'
      step: P1D
    latitude:
      type: spatial
      axis: y
      reference_system: 4326
      step: 0.25
      extent:
      - 90.0
      - -90.0
    longitude:
      type: spatial
      axis: x
      reference_system: 4326
      step: 0.25
      extent:
      - 0.0
      - 359.8
  dc:extent: 2.4 TB
  cube:variables:
    blh:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: Boundary layer height
      unit: m
    cape:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: Convective available potential energy
      unit: J kg**-1
    d2m:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: 2 metre dewpoint temperature
      unit: K
    ie:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: Instantaneous moisture flux
      unit: kg m**-2 s**-1
    iews:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: Instantaneous eastward turbulent surface stress
      unit: N m**-2
    inss:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: Instantaneous northward turbulent surface stress
      unit: N m**-2
    ishf:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: Instantaneous surface sensible heat net flux
      unit: W m**-2
    msl:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: Mean sea level pressure
      unit: Pa
    sd:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: Snow depth
      unit: m of water equivalent
    skt:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: Skin temperature
      unit: K
    sst:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: Sea surface temperature
      unit: K
    t2m:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: 2 metre temperature
      unit: K
    tcc:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: Total cloud cover
      unit: (0 - 1)
    u10:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: 10 metre U wind component
      unit: m s**-1
    u100:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: 100 metre U wind component
      unit: m s**-1
    v10:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: 10 metre V wind component
      unit: m s**-1
    v100:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: 100 metre V wind component
      unit: m s**-1
    z:
      dimensions:
      - valid_time
      - latitude
      - longitude
      type: data
      description: Geopotential
      unit: m**2 s**-2
